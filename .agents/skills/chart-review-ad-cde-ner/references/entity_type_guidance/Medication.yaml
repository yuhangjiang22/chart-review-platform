entity_type: Medication
guidance: |
  Tag medications mentioned in the chart — active orders, current
  prescriptions, dose changes, drug-class references. Tag both brand and
  generic names; map to the most specific AD-CDE class concept. Prefer
  the named class (e.g. Antihypertensive_Agents) when the prose
  references the class itself; prefer the specific drug when an
  individual agent is named. Don't tag drugs the patient declined or
  drugs listed as "no longer taking" without context — tag and let the
  status/anchor encode the negation.
exemplars:
  - "lisinopril 10 mg daily"
  - "antihypertensive therapy"
  - "donepezil"
  - "Benzodiazepines"
negative_examples:
  - phrase: "no allergies to penicillin"
    reason: "allergy denial; penicillin isn't a current medication here"
  - phrase: "may consider statin"
    reason: "possibility, not a current Medication concept"
edge_cases:
  - pattern: "<drug> <dose> <freq>"
    correct: "tag the drug name; encode dose+freq in anchor for disambiguation"
    reason: "the drug is the entity; dose is faithfulness context"
