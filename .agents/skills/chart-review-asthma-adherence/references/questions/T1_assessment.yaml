questions:
  - question_id: T1-ACTScore
    text: What is the most recent Asthma Control Test (ACT) score documented in the
      lookback window? (5-25 integer. Null when ACT was not recorded.)
    tier: 1
    answer_schema:
      type: number
      description: Integer 5..25, or null when no ACT is documented.
    retrieval_hints: "STRUCTURED FIRST →
      read_structured_data(table=\"measurements\"). Look for rows with
      loinc=\"75827-3\" (Asthma Control Test total score). Pick the row with the
      most recent date. The integer 5..25 is in the `value` field. Fallback to
      notes only when measurements has no ACT rows: visit assessment sections,
      \"ACT: 18/25\" style notations. Don't infer from \"well controlled\"
      prose."
  - question_id: T1-ExacerbationsCount
    text: How many asthma exacerbations are documented in the past 12 months?
      (Exacerbation = oral steroid burst, ED visit, or hospitalization for
      asthma.) Return 0 if you can review ANY meaningful clinical documentation
      covering the past 12 months and you do not find a qualifying exacerbation
      (you do not need an explicit “no exacerbations” statement). Use null only
      when the chart has essentially no clinical documentation in the lookback
      window to assess exacerbations.
    tier: 1
    answer_schema:
      type: number
    depends_on:
      - T0-AsthmaDx
    retrieval_hints: >-
      STRUCTURED FIRST. Sum from two tables: (1)
      read_structured_data(table="encounters") — count rows where
          type="Emergency" AND asthma_related=true within the 12-month
          lookback (and any "Inpatient" encounters with asthma chief
          complaint).
      (2) read_structured_data(table="drugs") — count distinct OCS
          burst courses (drug_class="OCS" or names like prednisone /
          methylprednisolone / dexamethasone, indication mentioning
          "asthma exacerbation" or "burst", days_supply <= 14).
      The total is the exacerbation count. Fallback to notes when both tables
      are empty: visit summaries, ED notes, prednisone bursts. Routine
      controller refills do NOT count.
  - question_id: T1-ControllerPrescribed
    text: Is at least one daily controller (ICS, ICS-LABA, LTRA, or biologic)
      prescribed and active in the lookback window?
    tier: 1
    answer_schema:
      type: boolean
    depends_on:
      - T0-AsthmaDx
    retrieval_hints: 'STRUCTURED FIRST → read_structured_data(table="drugs"). Any
      row with is_controller=true AND active=true counts as yes. drug_class
      values that qualify: ICS, ICS-LABA, LTRA, biologic. Fallback to notes when
      drugs is empty: med list mentions of fluticasone, budesonide, mometasone
      +/- formoterol or salmeterol; montelukast;
      omalizumab/mepolizumab/benralizumab/dupilumab/tezepelumab. Albuterol-only
      is NOT a controller.'
  - question_id: T1-ControllerAdherenceProxy
    text: Based on documented fills or patient report, is controller adherence
      assessed as adequate (>= 80% of expected doses) in the most recent 6
      months? Answer "adequate" or "inadequate" only when adherence is
      explicitly assessed. If adherence is not discussed or cannot be determined
      from the chart, answer "not_assessed" (do not return null).
    tier: 1
    answer_schema:
      type: string
      enum:
        - adequate
        - inadequate
        - not_assessed
    depends_on:
      - T1-ControllerPrescribed
    retrieval_hints: 'STRUCTURED FIRST → read_structured_data(table="drugs"). On the
      controller row, check `refill_pdc_12mo` (proportion of days covered). PDC
      >= 0.80 → "adequate"; PDC < 0.80 (but > 0) → "inadequate". If the
      controller row exists but has no refill_pdc_12mo field, check fills[]
      cadence vs days_supply manually. Fallback to notes: fill history mentions,
      patient- reported adherence in HPI. Default to "not_assessed" rather than
      guessing.'
  - question_id: T1-SABAOveruse
    text: Has the patient used >= 3 short-acting beta-agonist (SABA) canisters in
      the past year (a recognized poor-control marker)?
    tier: 1
    answer_schema:
      anyOf:
        - type: boolean
        - type: "null"
      description: true/false when SABA canister utilization is ascertainable; null
        when unknown.
    retrieval_hints: 'STRUCTURED FIRST → read_structured_data(table="drugs"). Find
      the SABA row (drug_class="SABA" or names albuterol/levalbuterol). Use
      `saba_canisters_12mo` if present; otherwise count fills[] entries whose
      fill_date is within the past 12 months. >= 3 canisters → true. Fallback to
      notes: HPI mentions of frequent rescue inhaler use.'
  - question_id: T1-SpirometryDate
    text: Date of the most recent spirometry in the lookback window (ISO
      YYYY-MM-DD). Null if no spirometry is documented.
    tier: 1
    answer_schema:
      type: string
      description: ISO date string or null.
    retrieval_hints: >-
      STRUCTURED FIRST. Check two tables: (1)
      read_structured_data(table="procedures") — look for cpt="94060"
          (spirometry pre/post-bronchodilator) or cpt="94010" (simple
          spirometry); pick the most recent procedure_date.
      (2) read_structured_data(table="measurements") — most recent
          row with loinc="19926-5" (FEV1/FVC) or "33452-4" (FEV1 %
          predicted) — its `date` field is the spirometry date.
      Take the more recent of the two as the answer. Fallback to notes: PFT
      reports, spirometry results in narrative.
