# T1 — Control assessment concordance. Each rule expresses an EPR-3 or
# 2020 Focused Update requirement and what should happen when the chart
# fails to demonstrate it.

rules:
  - rule_id: R-T1-ControllerForPersistent
    description: >-
      Persistent asthma (recent ACT < 20 OR >= 2 exacerbations) must
      have an active controller prescribed.
    naepp_source: >-
      EPR-3 Component 4 p.213 (Key Points: Medications) — 'long-term
      control medications [are] used to achieve and maintain control of
      persistent asthma' and ICS is 'the most potent and effective
      anti-inflammatory medication' (Evidence A). Stepwise approach
      Figure 4-5 prescribes a controller at Step 2 and above.
    evidence_grade: A
    verdict_if: "T1-ControllerPrescribed == true"
    excluded_if: "T1-ACTScore is missing and T1-ExacerbationsCount is missing"
    attribution_when:
      - when: "T1-ControllerPrescribed != true and T1-ControllerAdherenceProxy == \"patient_refusal\""
        category: PATIENT_REFUSAL
      - when: "T1-ControllerPrescribed != true"
        category: DOCUMENTATION_GAP
    nuanced: true
    judge_can_override: false
    supporting_questions: [T1-ACTScore, T1-ExacerbationsCount, T1-ControllerPrescribed, T1-ControllerAdherenceProxy]

  - rule_id: R-T1-NoSABAOveruse
    description: >-
      No SABA overuse (>= 3 canisters/year). SABA overuse signals
      poorly-controlled disease that wasn't escalated.
    naepp_source: >-
      EPR-3 Component 1 Figure 3-5 (Classifying Asthma Severity) — SABA
      use >2 days/week (not for EIB) classifies as 'not well controlled'.
      Operationalized as ≥3 canisters/year per HEDIS AMR. SABA overuse
      is among the strongest predictors of asthma-related morbidity and
      mortality (EPR-3 p.39 risk-domain discussion).
    evidence_grade: A
    verdict_if: "T1-SABAOveruse == false"
    attribution: GUIDELINE_DEVIATION
    supporting_questions: [T1-SABAOveruse]

  - rule_id: R-T1-AdherenceAssessed
    description: >-
      For patients on a controller, adherence is either adequate
      OR was at least assessed. Silent non-assessment is a
      documentation gap.
    naepp_source: >-
      EPR-3 Component 4 p.220 (Safety of ICS, Key Points) — 'Evaluate
      patient adherence and inhaler technique as well as environmental
      factors that may contribute to asthma severity before increasing
      the dose of ICS (Evidence B).'
    evidence_grade: B
    verdict_if: "T1-ControllerAdherenceProxy in [\"adequate\", \"inadequate\"]"
    excluded_if: "T1-ControllerPrescribed != true"
    attribution: DOCUMENTATION_GAP
    nuanced: true
    judge_can_override: false
    supporting_questions: [T1-ControllerPrescribed, T1-ControllerAdherenceProxy]

  - rule_id: R-T1-SpirometryWithin12mo
    description: >-
      Spirometry within the lookback window (EPR-3 recommends at least
      every 1-2 years for persistent asthma).
    naepp_source: >-
      EPR-3 Component 1 p.43-45 — 'spirometry is recommended at the
      time of initial assessment, after treatment is initiated and
      symptoms have stabilized, during a period of progressive or
      prolonged loss of control, and at least every 1-2 years'.
    evidence_grade: B
    verdict_if: "T1-SpirometryDate is present"
    attribution: DOCUMENTATION_GAP
    supporting_questions: [T1-SpirometryDate]

  - rule_id: R-T1-ComorbidityAssessedWhenUncontrolled
    description: >-
      When asthma is not well-controlled, the chart documents
      assessment of at least one comorbidity that affects asthma
      (rhinitis/sinusitis, GERD, obesity, OSA, depression/stress,
      tobacco/environmental exposure).
    naepp_source: >-
      EPR-3 Component 3 p.166 (Key Points) — 'Clinicians should
      evaluate a patient for the presence of a chronic comorbid
      condition when the patient's asthma cannot be well controlled.
      Treating the conditions may improve asthma management.'
      Evidence levels per comorbidity: ABPA (A), GERD (B), obesity (B),
      OSA (D), rhinitis/sinusitis (B), depression (D).
    evidence_grade: B
    verdict_if: "T1-ComorbidityAssessed in [\"assessed_and_addressed\", \"assessed_not_addressed\"]"
    excluded_if: "T1-ComorbidityAssessed == \"not_applicable\""
    attribution: DOCUMENTATION_GAP
    nuanced: true
    judge_can_override: false
    supporting_questions: [T1-ACTScore, T1-ExacerbationsCount, T1-ComorbidityAssessed]
