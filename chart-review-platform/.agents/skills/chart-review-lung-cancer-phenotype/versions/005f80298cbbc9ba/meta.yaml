overview_prose: 'This task determines whether a patient has lung cancer based on their
  EHR record. The phenotype produces a three-tier label: `confirmed` (pathology-supported),
  `probable` (imaging plus clinical diagnosis, or coding-only), or `absent` (no supporting
  evidence in the lookback window).


  **Source-document priority** (apply globally unless a field overrides):


  1. Surgical pathology report (LOINC 11526-1)

  2. Biopsy pathology report

  3. Outside-institution pathology in the media tab

  4. Treating-oncologist progress notes

  5. Imaging reports (CT chest, PET-CT)

  6. Problem list / encounter ICD codes


  **Lookback window** is 24 months prior to the index date. The index date is the
  start of the encounter that triggered the review.'
