entity_type: Diagnostic_Test
guidance: |
  Tag laboratory tests, imaging studies, and other diagnostic
  procedures done on the patient. Tag the test type itself
  (e.g. "12-lead EKG") not the specific result value. When a test
  is described abstractly ("get an EKG"), tag the test only if it
  was actually done — order intents without confirmation should be
  skipped.
exemplars:
  - "12-lead EKG"
  - "CT chest"
  - "comprehensive metabolic panel"
  - "PET scan"
  - "MoCA"
negative_examples:
  - phrase: "EKG ordered, pending"
    reason: "ordered but not yet done; not a Diagnostic_Test concept presence"
  - phrase: "abnormal EKG"
    reason: "tag the test (EKG), not the result qualifier 'abnormal'"
edge_cases:
  - pattern: "<test> result: <value>"
    correct: "tag the test name; result values are not Diagnostic_Test entities"
    reason: "AD-CDE Diagnostic_Test concepts are the test type, not measurements"
