entity_type: Procedure
guidance: |
  Tag surgical or interventional procedures that have happened or are
  scheduled. Tag the procedure regardless of timing — past, present,
  scheduled — but encode the timing in the anchor when relevant
  ("appendectomy 2019" not just "appendectomy" when context matters).
  Don't tag a procedure that the note merely describes as a possibility
  ("we considered surgical resection but deferred").

  Biopsy mapping:
  - If the text specifies a puncture/needle approach (e.g. "core needle biopsy",
    "needle biopsy"), map to "Puncture Procedure".
  - If the text is a generic "biopsy" mention without approach/type, map to the
    broader "Evaluation Procedure".
  - Imaging modifiers like "CT-guided" describe how the biopsy was performed; do
    NOT map the span to a Diagnostic_Test imaging concept because of the modifier.
exemplars:
  - appendectomy
  - bariatric surgery
  - cardiac catheterization
  - core needle biopsy
negative_examples:
  - phrase: considered surgical resection
    reason: considered but not done; not a Procedure concept presence
  - phrase: surgical pathology
    reason: this is a diagnostic test report, not a Procedure
edge_cases:
  - pattern: post-<procedure>
    correct: tag the procedure
    reason: post-X explicitly tells us X happened
