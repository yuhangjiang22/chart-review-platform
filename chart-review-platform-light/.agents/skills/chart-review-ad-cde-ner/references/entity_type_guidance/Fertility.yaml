entity_type: Fertility
guidance: |
  Tag fertility / reproductive-history facts — menopausal status,
  pregnancy history, parity, hormonal interventions. The AD-CDE
  Fertility subtree is small (13 concepts); when no exact concept
  matches, emit status='novel_candidate' with concept_name="".
  Only apply this entity type to female patients OR when the chart
  describes a partner's fertility history.
exemplars:
  - "post-menopausal"
  - "G3P2"
  - "menopause at age 51"
  - "hormone replacement therapy"
negative_examples:
  - phrase: "no contraception"
    reason: "contraception status; covered better under Medication or out of scope"
  - phrase: "elderly male patient"
    reason: "Fertility subtree applies to female reproductive history primarily"
edge_cases:
  - pattern: "<gravidity>/<parity> notation"
    correct: "tag the full notation as a single Fertility entity"
    reason: "GxPy is a single-token concept in clinical shorthand"
