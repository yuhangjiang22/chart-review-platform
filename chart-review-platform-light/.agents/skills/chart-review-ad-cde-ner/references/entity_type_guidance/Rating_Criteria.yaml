entity_type: Rating_Criteria
guidance: |
  Tag clinical scales, assessment instruments, and rating criteria
  used in the chart. This is the *scale* itself (MMSE, MoCA, CDR,
  ADAS-Cog, ACT, PHQ-9), not the numeric score it produced. Score
  values belong on the question_answer side (T1-ACTScore, etc.),
  not as NER spans.
exemplars:
  - "MMSE"
  - "MoCA"
  - "CDR sum of boxes"
  - "ADAS-Cog"
  - "ACT score"
negative_examples:
  - phrase: "MMSE 24/30"
    reason: "tag 'MMSE' as Rating_Criteria; the '24/30' is a value, not a scale"
  - phrase: "scoring well"
    reason: "vague language; no scale named"
edge_cases:
  - pattern: "<scale> = <number>"
    correct: "tag the scale name; anchor includes the number for context"
    reason: "the scale is the entity; the score is its measurement"
