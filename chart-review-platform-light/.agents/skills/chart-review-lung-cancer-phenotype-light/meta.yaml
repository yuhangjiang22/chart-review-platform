overview_prose: >-
  Extract two categorical fields per patient from clinical notes only:
  the cancer histology type and the disease extent. Notes are the sole
  source — there is no structured/OMOP data in this task.


  Source-document priority (apply globally): surgical pathology report >
  biopsy pathology report > treating-oncologist progress note > imaging
  report. Cite verbatim note text as evidence for every answer.
