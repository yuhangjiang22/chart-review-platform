entity_type: Demographic
guidance: |
  Tag demographic facts about the patient — age, gender, race, ethnicity,
  country of origin, marital status. Always prefer the most-specific child
  in the ontology subtree (e.g. "Female" not the parent "Gender"). Numeric
  ages always need an anchor that extends past the digits — text="67",
  anchor="age 67" — so the locate_in_source call disambiguates the digit
  string from other numbers in the note.
exemplars:
  - "67-year-old"
  - "age 67"
  - "67M"
  - "African American"
  - "Hispanic"
  - "married"
negative_examples:
  - phrase: "67mm mass"
    reason: "67 here is a measurement, not an age"
  - phrase: "family of 4"
    reason: "household size — not a demographic concept under this subtree"
edge_cases:
  - pattern: "67M  MRN: ..."
    correct: "tag '67' as age (anchor='67M') AND 'M' as Male (anchor='67M')"
    reason: "shorthand encodes two demographic facts in one token"
