task_type: phenotype_validation
review_unit: patient
manual_version: 2026-06-09
final_output: cancer_characterization
overview_prose: >-
  Extract cancer characterization per patient from clinical notes only. Answer
  three fields directly: the cancer histology type (cancer_type), whether
  distant (M1) metastasis is documented (has_distant_metastasis), and whether a
  local recurrence is documented (has_local_recurrence). The overall
  disease_extent is then COMPUTED from the latter two — do not answer it
  directly. Notes are the sole source — there is no structured/OMOP data in
  this task.


  Source-document priority (apply globally): surgical pathology report > biopsy
  pathology report > treating-oncologist progress note > imaging report. Cite
  verbatim note text as evidence for every answer.
phases:
  - try
  - validate
  - decide
