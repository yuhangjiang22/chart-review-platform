entity_type: Element_Relevant_to_Social_and_Community_Context
guidance: |
  Tag social-context factors — isolation, social support, caregiver
  status, community involvement. This is the most common Element subtree
  in clinical notes about cognitive concerns: caregivers and family
  involvement are nearly always discussed. Caregiver presence,
  loneliness, and bereavement all live here.
exemplars:
  - "lives alone"
  - "wife is primary caregiver"
  - "socially isolated"
  - "active in church"
  - "widowed"
  - "supportive family"
negative_examples:
  - phrase: "social worker consulted"
    reason: "care-team utilization, belongs in Health_Care subtree"
  - phrase: "social anxiety"
    reason: "psychiatric symptom, not a social-context fact"
edge_cases:
  - pattern: "wife handles all the medications"
    correct: "tag as caregiver-managed-medications (caregiver subtree)"
    reason: "encodes both a caregiver relationship AND a cognition-implying delegation"
  - pattern: "no family nearby"
    correct: "tag as social isolation / lack of family support"
    reason: "negation phrasing maps to a specific isolation concept"
