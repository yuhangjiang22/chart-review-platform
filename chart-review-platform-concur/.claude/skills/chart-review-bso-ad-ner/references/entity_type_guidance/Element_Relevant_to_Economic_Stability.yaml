entity_type: Element_Relevant_to_Economic_Stability
guidance: |
  Tag economic-stability facts — employment status, income level, housing
  security, financial strain. Look for negations: "not employed" still
  maps to the "Unemployed" concept (the entity exists in the patient's
  state, the negation just inverts the surface form). Housing instability
  often appears as a behavior phrase ("lives with daughter due to
  finances") rather than a direct status.
exemplars:
  - "retired"
  - "unemployed"
  - "fixed income"
  - "disability"
  - "lives alone in apartment"
  - "lost job"
negative_examples:
  - phrase: "employed by Methodist Hospital"
    reason: "tag 'employed' as status; the employer name is not an ontology concept"
  - phrase: "not stable"
    reason: "vital-signs instability — clinical, not economic; context-dependent"
edge_cases:
  - pattern: "wife handles finances"
    correct: "tag as caregiver-managed-finances / cognitive-decline indicator if in dementia note"
    reason: "social context, not purely economic; check Social_and_Community_Context subtree first"
