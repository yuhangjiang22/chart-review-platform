entity_type: Element_Relevant_to_Education_and_Literacy
guidance: |
  Tag education and literacy facts — highest grade completed, degrees,
  reading ability. The concept_name should match the LEVEL (e.g. "Some
  College", "High School Graduate") not the institution name. Literacy
  concerns ("difficulty reading prescription labels") map to the literacy
  subtree even when phrased clinically.
exemplars:
  - "high school graduate"
  - "some college"
  - "bachelor's degree"
  - "12 years of education"
  - "completed 8th grade"
  - "literate"
negative_examples:
  - phrase: "Indiana University Health"
    reason: "institution as the care provider, not the patient's education"
  - phrase: "patient is well-educated about her diagnosis"
    reason: "health literacy in a specific topic, not general education level"
edge_cases:
  - pattern: "GED"
    correct: "map to 'High School Equivalent' concept (or 'High School Graduate' if no GED concept exists)"
    reason: "abbreviation needs explicit ontology mapping"
