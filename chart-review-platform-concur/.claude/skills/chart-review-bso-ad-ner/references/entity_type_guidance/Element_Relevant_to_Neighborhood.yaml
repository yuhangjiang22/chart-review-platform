entity_type: Element_Relevant_to_Neighborhood
guidance: |
  Tag neighborhood-level factors — walkability, crime exposure,
  environmental hazards, neighborhood services. These are rare in
  clinical notes; usually present only in detailed social-work
  assessments or geriatric histories that explicitly probe living
  environment. Most notes will yield zero spans here.
exemplars:
  - "lives in a high-crime area"
  - "unsafe neighborhood"
  - "no sidewalks"
  - "lead exposure"
  - "rural area, no public transit"
negative_examples:
  - phrase: "neighborhood pharmacy"
    reason: "incidental geography, not a neighborhood-condition fact"
  - phrase: "from Brooklyn"
    reason: "place of origin, not a neighborhood-quality fact"
edge_cases:
  - pattern: "afraid to walk to the store"
    correct: "tag as walkability / safety concern if the ontology has a matching concept; else novel_candidate"
    reason: "indirect phrasing about neighborhood quality"
