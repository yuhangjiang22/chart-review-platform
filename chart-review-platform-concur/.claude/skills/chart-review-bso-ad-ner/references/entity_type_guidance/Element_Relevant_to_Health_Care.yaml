entity_type: Element_Relevant_to_Health_Care
guidance: |
  Tag health-care access, utilization, and insurance facts. Includes both
  positive ("Medicare", "had insurance") and negative ("uninsured", "no
  PCP") mappings — each maps to a distinct ontology concept. Mentions of
  the patient's provider by name are NOT health-care concepts unless they
  encode access (e.g. "no primary care provider").
exemplars:
  - "Medicare"
  - "Medicaid"
  - "uninsured"
  - "no primary care provider"
  - "missed multiple appointments"
  - "private insurance"
negative_examples:
  - phrase: "Dr. Caldwell, PCP"
    reason: "provider name + role — only tag the access fact (has-PCP) if relevant, not the name"
  - phrase: "scheduled follow-up in 3 months"
    reason: "appointment scheduling, not access/utilization"
edge_cases:
  - pattern: "lost insurance after retirement"
    correct: "tag the post-retirement state (e.g. 'Medicare') if mentioned; if just 'lost insurance', tag as Uninsured"
    reason: "transition phrase encodes a current status fact"
