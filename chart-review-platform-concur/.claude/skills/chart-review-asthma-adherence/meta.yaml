overview_prose: >-
  Asthma management guideline-concordance task. Extracts per-patient
  structured answers to a tier-stratified question framework (T0
  eligibility / T1 control assessment / T2 management) and evaluates
  concordance via a deterministic ruleset. Output per patient is a
  QuestionAnswer[] + RuleVerdict[] pair persisted in the union-shaped
  review_state.json.

  Source documents:
    - NHLBI EPR-3 Full Report 2007 ("Expert Panel Report 3: Guidelines
      for the Diagnosis and Management of Asthma")
    - NHLBI 2020 Focused Updates to the Asthma Management Guidelines
    - ACCR System Design (2026-03-Agentic-Asthma-Adherence-Design.pdf)

  Each question and rule carries a `naepp_source` field with page
  references and evidence grade (A/B/C/D for EPR-3; Strong/Conditional
  for 2020 Update). v0.1 -> v0.2 added 3 questions (T1-ComorbidityAssessed,
  T2-InhalerTechniqueChecked, T2-ComorbidityAddressed) and 3 rules
  derived from EPR-3 Components 2 and 3.
final_output: rule_verdicts
phases:
  - author
  - try
  - validate
  - decide
  - lock
  - deploy
