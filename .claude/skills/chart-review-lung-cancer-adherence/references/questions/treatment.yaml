# T4 — Treatment alignment + timing facts. Feed the time-to-treatment (C5),
# targeted-therapy-alignment (C6), and panel-completeness (C2) rules.

questions:
  - question_id: MT9
    text: "For a patient with an actionable mutation, was the guideline-recommended targeted therapy initiated as first-line treatment?"
    tier: 4
    answer_schema: { type: string, enum: [yes, no, not_applicable, unclear] }
    depends_on: [MT8a]
    retrieval_hints: "Oncology first-line regimen. not_applicable if no actionable mutation (MT8a == no)."

  - question_id: MT10
    text: "What was the time from initial lung cancer diagnosis to initiation of first-line systemic therapy, in DAYS?"
    tier: 4
    answer_schema: { type: number }
    depends_on: [MT0a]
    retrieval_hints: "Diagnosis date → first systemic therapy start date, in days. Leave unanswered if either date is undocumented."

  - question_id: MT11
    text: "What was the turnaround time for genomic testing (order/specimen to result), in DAYS?"
    tier: 4
    answer_schema: { type: number }
    depends_on: [MT1]
    retrieval_hints: "Molecular test order/collection date → result date, in days."

  - question_id: MT12
    text: "If CGP was NOT performed, were at minimum EGFR, ALK, ROS1, BRAF, KRAS, and PD-L1 all tested (the essential NSCLC biomarkers)?"
    tier: 4
    answer_schema: { type: string, enum: [yes, no, not_applicable, unclear] }
    depends_on: [MT2]
    retrieval_hints: "Check each essential biomarker was covered. not_applicable if CGP (a named MT2 vendor) was done."
