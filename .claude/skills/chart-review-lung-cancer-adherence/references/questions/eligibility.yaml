# T0 — Eligibility + context. Answer options align with the lung-cancer-experiment
# annotation tool's canonical QUESTION_LAYOUTS. Answer these FIRST — histology +
# stage gate the molecular-testing concordance rules.

questions:
  - question_id: MT0a
    text: "Does the patient have a confirmed lung cancer diagnosis (pathologically confirmed, with a date of diagnosis)?"
    tier: 0
    answer_schema:
      type: string
      enum: [yes, no, unclear]
    guideline_reference: "Eligibility — lung cancer diagnosis confirmation."
    retrieval_hints: "Pathology report confirming lung cancer + date of diagnosis."

  - question_id: MT0b
    text: "What is the histologic subtype of the lung cancer?"
    tier: 0
    answer_schema:
      type: string
      enum: [adenocarcinoma, squamous, small_cell, nsclc_nos, other, unclear]
    guideline_reference: "Histology — drives the molecular-testing indication (small_cell is generally not required)."
    retrieval_hints: "Pathology 'Diagnosis'/'Histologic type'. small_cell = SCLC; squamous, adenocarcinoma, nsclc_nos are NSCLC."

  - question_id: MT0c
    text: "What is the stage of the lung cancer at diagnosis?"
    tier: 0
    answer_schema:
      type: string
      enum: ["I", "II", "IIIA", "IIIB", "IV", "limited", "extensive", "unknown"]
    guideline_reference: "Stage — advanced/metastatic NSCLC (IIIB/IV) has the strongest molecular-testing indication."
    retrieval_hints: "AJCC stage in pathology/oncology staging notes. limited/extensive apply to small_cell."

  - question_id: MT0d
    text: "What is the patient's tobacco use history?"
    tier: 0
    answer_schema:
      type: string
      enum: ["current smoker", "former smoker", "never smoker", "unknown"]
    guideline_reference: "Smoking history — never smokers have higher actionable-mutation prevalence."
    retrieval_hints: "Social history / HPI smoking status."
