# T1–T3 — Molecular workup facts. Options align with the lung-cancer-experiment
# annotation tool's canonical QUESTION_LAYOUTS (binaries use `unclear`; MT2 is the
# CGP vendor). Put detail (gene names, dates) in the rationale.

questions:
  - question_id: MT1
    text: "Was genomic (molecular/mutation) testing performed at all?"
    tier: 1
    answer_schema: { type: string, enum: [yes, no, unclear] }
    depends_on: [MT0a]
    retrieval_hints: "Molecular/genomics reports; any NGS, single-gene, or panel result."

  - question_id: MT7
    text: "Was PD-L1 testing (immunohistochemistry) performed?"
    tier: 1
    answer_schema: { type: string, enum: [yes, no, unclear] }
    depends_on: [MT0a]
    retrieval_hints: "Pathology / IHC report for a PD-L1 / 22C3 / SP263 result."

  - question_id: MT2
    text: "Was comprehensive genomic profiling (CGP / large NGS panel) performed, and on which platform?"
    tier: 2
    answer_schema:
      type: string
      enum: [Tempus, Caris, Foundation, in_house, other, not_performed, unclear]
    depends_on: [MT1]
    retrieval_hints: "Name the CGP vendor: Tempus, Caris, Foundation (FoundationOne), in_house institutional panel, or other. not_performed if no broad panel was run."

  - question_id: MT3
    text: "If CGP was NOT performed, was single-gene testing or a targeted lung panel performed? Name the specific genes in the rationale."
    tier: 2
    answer_schema: { type: string, enum: [yes, no, not_applicable, unclear] }
    depends_on: [MT1, MT2]
    retrieval_hints: "EGFR/ALK/ROS1 single-gene or small-panel results. not_applicable if CGP was done."

  - question_id: MT4
    text: "Was genomic profiling done on tumor tissue, liquid biopsy (blood/ctDNA), or both?"
    tier: 2
    answer_schema: { type: string, enum: [tissue, liquid, both, unknown] }
    depends_on: [MT1]
    retrieval_hints: "Specimen type on the molecular report."

  - question_id: MT5
    text: "Relative to first-line therapy, when was genomic testing ORDERED? (state the first-line therapy type in the rationale)"
    tier: 2
    answer_schema: { type: string, enum: [before_1L, same_date, after_1L, no_systemic_therapy, unclear] }
    depends_on: [MT1]
    retrieval_hints: "Compare the molecular test ORDER date to the first-line therapy start date. no_systemic_therapy if surgery-only / palliative."

  - question_id: MT6
    text: "Were genomic testing RESULTS available before first-line therapy was initiated?"
    tier: 2
    answer_schema: { type: string, enum: [yes, no, unclear] }
    depends_on: [MT1]
    retrieval_hints: "Compare the molecular RESULT date to the first-line therapy start date."

  - question_id: MT7a
    text: "If PD-L1 testing was performed, what was the result (TPS band)?"
    tier: 3
    answer_schema: { type: string, enum: [lt_1, 1_to_49, gte_50, cps_reported, not_tested, unclear] }
    depends_on: [MT7]
    retrieval_hints: "PD-L1 TPS: lt_1 = <1%, 1_to_49 = 1-49%, gte_50 = >=50%. cps_reported if only a CPS score is given."

  - question_id: MT8
    text: "What were the genomic testing results? Report each actionable finding with the exact gene and variant."
    tier: 3
    answer_schema: { type: string }
    depends_on: [MT1]
    retrieval_hints: "Free text — list gene + variant (e.g. 'EGFR exon 19 deletion', 'ALK fusion', 'KRAS G12C'). Write 'none' if no actionable findings."

  - question_id: MT8a
    text: "Was an actionable mutation identified that has an FDA-approved targeted therapy?"
    tier: 3
    answer_schema: { type: string, enum: [yes, no, unclear] }
    depends_on: [MT8]
    retrieval_hints: "EGFR/ALK/ROS1/BRAF V600E/RET/MET ex14/NTRK/KRAS G12C etc. with an approved drug = yes; no driver = no."
