overview_prose: >-
  Lung cancer (NSCLC) molecular-testing guideline-concordance task. The agent
  answers FACTUAL chart-review questions in tiers — (T0) eligibility: confirmed
  lung cancer, histologic subtype, stage, smoking history; (T1–T3) the molecular
  workup: whether genomic testing and PD-L1 IHC were performed, comprehensive
  genomic profiling vs single-gene/panel, specimen (tissue/liquid), test-vs-
  therapy sequencing, results availability, PD-L1 result, actionable findings;
  (T4) treatment alignment: targeted therapy for actionable mutations, time to
  treatment, turnaround, minimum-biomarker completeness. The seven NCCN
  molecular-testing concordance verdicts (C1–C6) are then computed
  DETERMINISTICALLY by the rule-engine from those facts
  (references/rules/concordance.yaml) — testing performed, panel completeness,
  testing-before-therapy (order + results), PD-L1 testing, time-to-treatment,
  and targeted-therapy alignment — each Concordant / Non-concordant / Excluded,
  with a lung-specific attribution category for non-concordant verdicts. Facts
  are read from pathology, molecular/genomics, radiology, and oncology notes plus
  structured EHR data.

  Derived from the lung cancer molecular-testing checklist + the Concordance
  Rules for Expert Review (lung-cancer-experiment). This is the TASK ONLY — the
  question + rule rubric — not the experiment's benchmark harness, annotation
  tooling, or scoring scripts.
final_output: rule_verdicts
