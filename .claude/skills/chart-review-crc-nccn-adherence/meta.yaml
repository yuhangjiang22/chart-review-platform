overview_prose: >-
  Colorectal cancer (CRC) NCCN guideline-concordance task. Per CRC patient, the
  reviewer answers a small set of guideline-concordance questions — each judged
  Concordant / Discordant / Not applicable — covering molecular testing, staging
  workup, surgical nodal adequacy, and stage-appropriate systemic/neoadjuvant
  therapy. Answers are read from pathology, radiology, oncology, and operative
  notes plus structured EHR data.

  Derived from the CRC EvoSkill study design (2026-03-23), Section 3 "Downstream
  Concordance Rules". This is the TASK ONLY — the concordance question rubric —
  not the study's abstraction targets, baselines/EvoSkill conditions, difficulty
  levels, data-prep, or evaluation methodology. The stage-conditional rules use
  three eligibility questions (site, stage group) to set their N/A conditions.
