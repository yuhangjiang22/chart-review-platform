# Concordance tier — the 5 NCCN concordance rules from the CRC EvoSkill design
# (Section 3), framed as adherence questions. Each is judged:
#   concordant      — care met the guideline
#   discordant      — care did not meet the guideline
#   not_applicable  — the rule's N/A condition holds (stated per question)
# Apply the N/A condition BEFORE judging concordant/discordant.

questions:
  - question_id: C1-MSI-MMR-Testing
    text: >-
      Was MSI/MMR status (microsatellite instability or mismatch-repair
      immunohistochemistry) tested and resulted for this patient?
    tier: 1
    answer_schema:
      type: string
      enum: [concordant, discordant, not_applicable]
    na_condition: "None — NCCN recommends universal MSI/MMR testing for all CRC, so this is rarely N/A."
    depends_on: [T0-CRCConfirmed]
    nccn_source: "NCCN Colon/Rectal: universal MSI/MMR (dMMR/MSI-H) testing recommended for all CRC patients."
    clinical_rationale: >-
      MSI-H/dMMR vs MSS/pMMR drives immunotherapy eligibility and the Stage II
      adjuvant-chemo decision; absence of testing is a concordance gap.
    retrieval_hints: >-
      Pathology / molecular-lab notes for MSI-H, MSS, dMMR, pMMR, or MMR IHC
      (MLH1/MSH2/MSH6/PMS2). A result of any kind = concordant; no test ordered
      or resulted = discordant.

  - question_id: C2-StagingWorkupComplete
    text: >-
      Was the baseline staging workup complete — CT chest/abdomen/pelvis (or
      equivalent cross-sectional imaging) AND a baseline CEA level?
    tier: 1
    answer_schema:
      type: string
      enum: [concordant, discordant, not_applicable]
    na_condition: "None for non-metastatic workup; mark not_applicable only if the chart documents a workup deferred for a valid clinical reason."
    depends_on: [T0-CRCConfirmed]
    nccn_source: "NCCN CRC workup: CT chest/abdomen/pelvis + baseline CEA at diagnosis."
    clinical_rationale: >-
      Complete staging workup is the precondition for correct stage assignment
      and treatment selection.
    retrieval_hints: >-
      Radiology reports (CT/MRI/PET of chest, abdomen, pelvis) + labs/oncology
      notes for a baseline CEA. Both present = concordant; either missing =
      discordant. (If structured orders are unavailable, read it from free-text
      radiology/oncology notes.)

  - question_id: C3-NodeHarvestAdequate
    text: >-
      Were at least 12 regional lymph nodes examined in the surgical resection
      specimen?
    tier: 1
    answer_schema:
      type: string
      enum: [concordant, discordant, not_applicable]
    na_condition: "No surgical resection was performed (e.g. non-operative, neoadjuvant-only, or metastatic-first cases)."
    depends_on: [T0-CRCConfirmed]
    nccn_source: "NCCN / CAP: a minimum of 12 regional lymph nodes should be examined for adequate nodal staging."
    clinical_rationale: >-
      Inadequate node harvest (<12) understages N and can wrongly withhold
      adjuvant therapy; ≥12 is the standard adequacy threshold.
    retrieval_hints: >-
      Surgical pathology 'Regional Lymph Nodes Examined' count. >=12 =
      concordant; <12 = discordant; no resection in the chart = not_applicable.

  - question_id: C4-StageIII-AdjuvantChemo
    text: >-
      For a Stage III patient, was adjuvant systemic chemotherapy (FOLFOX or
      CAPOX) administered or documented as recommended/offered?
    tier: 2
    answer_schema:
      type: string
      enum: [concordant, discordant, not_applicable]
    na_condition: "Stage Group is I, II, or IV (not III), or stage group is unknown."
    depends_on: [T0-StageGroup]
    nccn_source: "NCCN Colon: adjuvant FOLFOX or CAPOX is recommended for resected Stage III colon cancer."
    clinical_rationale: >-
      Adjuvant chemotherapy is the standard of care for Stage III and the most
      consequential stage-conditional treatment decision.
    retrieval_hints: >-
      Use T0-StageGroup: judge only if Stage III. Oncology notes / chemo orders
      for FOLFOX or CAPOX (or documented recommendation + patient declination =
      still concordant care). Given but for the wrong stage is judged on its own
      stage.

  - question_id: C5-Rectal-NeoadjuvantCRT
    text: >-
      For a locally advanced rectal cancer (Stage II–III), was neoadjuvant
      chemoradiation (or total neoadjuvant therapy) given BEFORE definitive
      surgery?
    tier: 2
    answer_schema:
      type: string
      enum: [concordant, discordant, not_applicable]
    na_condition: "Colon primary (not rectal), OR rectal Stage I or IV, OR stage/subsite unknown."
    depends_on: [T0-Subsite, T0-StageGroup]
    nccn_source: "NCCN Rectal: neoadjuvant chemoradiation / TNT before surgery for locally advanced (cT3-4 or node-positive, i.e. Stage II–III) rectal cancer."
    clinical_rationale: >-
      Neoadjuvant chemoradiation before TME is standard for locally advanced
      rectal cancer; surgery-first in these patients is a concordance gap.
    retrieval_hints: >-
      Use T0-Subsite (rectal only) + T0-StageGroup (II–III). Check the
      treatment sequence in oncology/radiation-oncology/operative notes:
      radiation + chemo dated BEFORE the resection = concordant.
