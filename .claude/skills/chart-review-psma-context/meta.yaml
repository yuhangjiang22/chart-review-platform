overview_prose: >-
  PSMA PET/CT clinical-context task. The agent answers factual chart-review
  questions in tiers — (T0) eligibility: this is a PSMA PET/CT, confirmed
  prostate adenocarcinoma; (T1) disease/staging: Grade Group, most-recent PSA,
  PSA trend, prior metastatic sites; (T2) treatment history:
  prostatectomy, radiation, ADT, ARPI, chemotherapy, radioligand therapy; (T3)
  exam context: the indication for this scan, prior PET/CT disease status, and
  any prior-imaging follow-up recommendation. Facts are read from pathology,
  oncology, urology, radiation-oncology, and prior imaging notes plus structured
  EHR data (PSA, medications, procedures). This is a CONTEXT-EXTRACTION task —
  it provides context for interpretation, it does not judge the scan or make
  recommendations, so no concordance rules are defined. DRAFT — question topics
  are from the project scope doc; enums and clinical specifics are unvalidated
  and pending clinician review (see RUBRIC_DRAFT.md).
