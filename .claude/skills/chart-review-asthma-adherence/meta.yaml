overview_prose: >-
  PEDIATRIC asthma management guideline-concordance task. Study population is
  pediatric patients ages 2-17 (per the cohort definition and design doc).
  Guideline HANDLING is age-band-stratified per NAEPP EPR-3 (ages 0-4, 5-11,
  12+): T0-AgeBand selects the age-appropriate control instrument (Childhood ACT
  for 5-11, ACT for 12-17, symptom/exacerbation-based for 2-4) and the
  age-appropriate stepwise-therapy table. Extracts per-patient structured
  answers to a tier-stratified question framework (T0 eligibility / T1 control
  assessment / T2 management) and evaluates concordance via a deterministic
  ruleset. Output per patient is a QuestionAnswer[] + RuleVerdict[] pair
  persisted in the union-shaped review_state.json.

  Source documents:
    - NHLBI EPR-3 Full Report 2007 ("Expert Panel Report 3: Guidelines
      for the Diagnosis and Management of Asthma")
    - NHLBI 2020 Focused Updates to the Asthma Management Guidelines
    - ACCR System Design (2026-03-Agentic-Asthma-Adherence-Design.pdf)
    - Cohort Definition (Cohort_Definition_Asthma_Adherence.docx) — inclusion
      criteria: pediatric patients ages 2-17

  Each question and rule carries a `naepp_source` field with page references and
  evidence grade (A/B/C/D for EPR-3; Strong/Conditional for 2020 Update). v0.1
  -> v0.2 added 3 questions (T1-ComorbidityAssessed, T2-InhalerTechniqueChecked,
  T2-ComorbidityAddressed) and 3 rules derived from EPR-3 Components 2 and 3.
  v0.2 -> v0.3 aligned the instrument to the PEDIATRIC 2-17 cohort: T0-AgeOk
  changed from ">= 12" to "2-17"; added T0-AgeBand (2-4 / 5-11 / 12-17) driving
  age-appropriate control instrument (ACT vs Childhood ACT) and stepwise-therapy
  table; T1-ACTScore and T2-StepTherapyMatch made age-band aware. PENDING PI
  sign-off: the 5-year-old handling boundary (NAEPP 5-11 / C-ACT vs the design's
  2-5 reporting stratum), and the exact per-band step tables.
final_output: rule_verdicts
