# T2 — Management tier. EPR-3 Section 5 (Managing Asthma Long Term)
# defines the stepwise approach (Figures 4-5, 4-6); EPR-3 Component 2
# (p.94-98) defines education and the written action plan; 2020 Focused
# Update Section IV (Recs 12-16, p.80-95) updates step therapy to favor
# SMART (ICS-formoterol single inhaler) for moderate-severe persistent
# asthma in patients 12+.

questions:
  - question_id: T2-StepTherapyMatch
    text: >-
      Does the current controller regimen match the guideline stepwise-therapy
      table FOR THE PATIENT'S AGE BAND (T0-AgeBand) and control level? EPR-3 has
      distinct stepwise tables for ages 0-4, 5-11, and 12+; apply the one for
      this patient's band. (Ages 12-17: per the 2020 Update, moderate-severe
      persistent favors ICS-formoterol SMART or ICS-LABA; mild persistent =
      low-dose ICS. Ages 5-11: EPR-3 Figures 4-1b/4-2b — low-dose ICS preferred
      at Step 2, medium-dose ICS or ICS-LABA at Steps 3-4. Ages 2-4: EPR-3
      Figure 4-1a — low-dose ICS preferred at Step 2, LTRA/cromolyn alternative;
      SMART and LABA are NOT first-line in this band.)
    tier: 2
    answer_schema:
      type: string
      enum:
        - matches
        - under_treated
        - over_treated
        - unknown
    depends_on:
      - T0-AgeBand
      - T1-ControllerPrescribed
      - T1-ACTScore
      - T1-ExacerbationsCount
    naepp_source: "EPR-3 Section 4 'Managing Asthma Long Term' — AGE-BAND
      stepwise tables: Figures 4-1a/4-2a (ages 0-4), Figures 4-1b/4-2b (ages
      5-11), Figure 4-5 (Youths ≥12 and Adults, p.343); UPDATED by 2020
      Focused Update Rec 13 (p.84) — 'In individuals ages 12 years and
      older with moderate to severe persistent asthma, the Expert Panel
      conditionally recommends ICS-formoterol in a single inhaler used as
      both daily controller and reliever therapy compared to higher-dose
      ICS-LABA as daily controller therapy and SABA for quick-relief
      therapy.' (Strong recommendation, high certainty for Rec 12.) Also
      Recs 14-16 for LAMA add-on as Step 4 alternative when LABA is
      contraindicated or unavailable."
    evidence_grade: A_for_step_therapy_strong_for_SMART_conditional_for_LAMA
    clinical_rationale: >-
      The stepwise approach (Step 1-6) is the operational definition of
      guideline-concordant asthma management. Mismatch in either
      direction (under-treated = symptoms despite low step; over-treated
      = high step despite well-controlled symptoms) signals a
      concordance gap. SMART is the 2020 Update's preferred regimen for
      moderate-severe persistent in patients 12+.
    retrieval_hints: >-
      FIRST select the stepwise table for T0-AgeBand (2-4 -> EPR-3 Fig 4-1a;
      5-11 -> Fig 4-1b; 12-17 -> Fig 4-5 + 2020 SMART/LAMA). SMART and biologics
      referenced below apply to ages 12+ (and, for some biologics, 6+); for ages
      2-11 the preferred step-up is medium-dose ICS or ICS-LABA per the pediatric
      figures, NOT SMART. The control cutoffs (>= 20 well controlled) use the
      band-appropriate score (ACT 12-17 / C-ACT 5-11). Then:
      Compare T1 control signals to the regimen captured in
      T1-ControllerPrescribed:
      (a) Well-controlled (control score >= 20, no exacerbations) on ICS or
          ICS-LABA → 'matches'.
      (b) Not well-controlled (ACT 16-19, OR exacerbations >= 1, OR
          SABAOveruse=true) on low-dose ICS only → 'under_treated'
          (should step up to medium-dose ICS or ICS-LABA / SMART).
      (c) Very poorly controlled (ACT < 16, OR exacerbations >= 2) on
          ICS or low-dose ICS-LABA → 'under_treated' (should be on
          medium/high-dose ICS-LABA, consider SMART or biologic).
      (d) Well-controlled patient on high-dose ICS-LABA + biologic → may be
          'over_treated' if step-down was not attempted (EPR-3 p.345
          'consider step down if well-controlled at least 3 months').
      (e) Insufficient information (no ACT, no exacerbation count) → 'unknown'.

  - question_id: T2-WrittenActionPlan
    text: Is an asthma written action plan documented as given to the patient in the
      lookback window? Answer true only when the chart explicitly documents an
      action plan being given or reviewed. If there is no documentation of an
      action plan in the lookback window, answer false (do not return null for
      "not found").
    tier: 2
    answer_schema:
      type: boolean
    naepp_source: "EPR-3 Section 3, Component 2, p.94 (Key Points: Patient
      Education) — 'Provide all patients with a written asthma action plan
      that includes two aspects: (1) daily management and (2) how to
      recognize and handle worsening asthma. Written action plans are
      particularly recommended for patients who have moderate or severe
      persistent asthma, a history of severe exacerbations, or poorly
      controlled asthma (Evidence B).' Also p.97 — 'Clinicians provide all
      patients with a written asthma action plan' (Evidence B)."
    evidence_grade: B
    clinical_rationale: >-
      The written action plan is one of three pillars of EPR-3
      self-management education (action plan, self-monitoring, regular
      clinician review). It is THE most concrete documentation artifact
      a chart review can verify for the education component.
    retrieval_hints: >-
      STRUCTURED FIRST → read_structured_data(table="observations"). Look
      for concept_name="Asthma written action plan given" — value
      "yes"/"no" is the answer. Most recent row wins. Fallback to notes
      when observations is empty: "AAP provided", "asthma action plan
      reviewed", patient education sections of visit notes.

  - question_id: T2-FollowupScheduled
    text: Is a follow-up visit (in person or telehealth) scheduled within 3 months
      of the most recent encounter?
    tier: 2
    answer_schema:
      type: boolean
    naepp_source: "EPR-3 Section 3, Component 2, p.94 (Key Points) —
      'Regular review, by an informed clinician, of the status of the
      patient's asthma control is an essential part of asthma
      self-management education (Evidence B).' EPR-3 Section 4 (Stepwise
      Approach) recommends follow-up at 2-6 weeks when initiating or
      stepping up therapy, then every 1-6 months when controlled."
    evidence_grade: B
    clinical_rationale: >-
      Regular clinician review is the third pillar of EPR-3
      self-management. 3 months is the upper bound of EPR-3's recommended
      follow-up interval for stable persistent asthma. A patient with no
      scheduled follow-up is at risk of falling out of the longitudinal
      care that controls chronic disease.
    retrieval_hints: >-
      STRUCTURED FIRST → read_structured_data(table="encounters"). If
      any encounter has start_date AFTER the index_date (or within the
      next 3 months from the most recent encounter), that's a scheduled
      follow-up → true. Fallback to notes: plan/disposition sections.
      Treat "RTC PRN" as false.

  - question_id: T2-InhalerTechniqueChecked
    text: Has inhaler technique been assessed (and corrected if needed) in the
      lookback window?
    tier: 2
    answer_schema:
      type: string
      enum:
        - assessed_correct
        - assessed_corrected
        - not_assessed
    naepp_source: "EPR-3 Section 3, Component 2, p.94 (Key Points: Patient
      Education, skills bullet) — 'Skills: e.g., inhaler technique, use
      of a valved holding chamber (VHC) or spacer, and self-monitoring'.
      EPR-3 Section 3, Component 4, p.220 (Safety of ICS, Key Points) —
      'Evaluate patient adherence and inhaler technique as well as
      environmental factors that may contribute to asthma severity
      before increasing the dose of ICS (Evidence B).'"
    evidence_grade: B
    clinical_rationale: >-
      Up to 70% of patients use inhalers incorrectly. EPR-3 explicitly
      requires assessing technique before stepping up therapy — apparently
      uncontrolled asthma may simply be a delivery problem. This is the
      most commonly missed step in chart-documented education.
    retrieval_hints: >-
      Fallback to notes (no canonical structured concept): patient
      education sections, "demonstrated inhaler technique", "reviewed
      spacer use", "corrected inhaler technique". 'assessed_correct' =
      technique reviewed, no issues. 'assessed_corrected' = errors found,
      coaching given. 'not_assessed' = no documentation of technique
      review in any visit during the lookback.

  - question_id: T2-ComorbidityAddressed
    text: For patients with documented asthma-relevant comorbidities (from
      T1-ComorbidityAssessed), is there a documented management plan
      (referral, treatment, lifestyle counseling)?
    tier: 2
    answer_schema:
      type: string
      enum:
        - addressed
        - acknowledged_not_addressed
        - not_applicable
    depends_on:
      - T1-ComorbidityAssessed
    naepp_source: "EPR-3 Section 3, Component 3, p.166 — 'Treating the
      conditions may improve asthma management: ABPA (Evidence A), GERD
      (Evidence B), obesity (Evidence B, limited studies), OSA (Evidence
      D), rhinitis/sinusitis (Evidence B), chronic stress/depression
      (Evidence D).' Allergen avoidance multifaceted approach (Evidence
      A); avoid environmental tobacco smoke (Evidence C); influenza
      vaccination (Evidence A)."
    evidence_grade: B
    clinical_rationale: >-
      Identifying a comorbidity without addressing it is itself a gap.
      EPR-3 frames comorbidity management as part of the integrated
      asthma plan — referral to allergy/ENT, PPI trial for GERD,
      smoking cessation referral, sleep study referral, influenza
      vaccination all count as 'addressed'.
    retrieval_hints: >-
      Predicate on T1-ComorbidityAssessed.
      If T1-ComorbidityAssessed = 'not_assessed' OR 'not_applicable' →
          return 'not_applicable'.
      Otherwise check notes: plan sections for referrals (allergy, ENT,
      GI, sleep, behavioral health, dietitian), medications (PPIs for
      GERD, antihistamines/intranasal steroids for rhinitis), counseling
      documentation (smoking cessation, weight loss), vaccinations
      (influenza). Structured fallback:
      read_structured_data(table="drugs") for relevant adjunctive meds;
      read_structured_data(table="procedures") for vaccinations.

  - question_id: T2-ContraindicationDocumented
    text: If the patient is NOT on a controller that matches step therapy, is a
      contraindication or patient-refusal explicitly documented (so the gap is
      attributable, not an undocumented omission)?
    tier: 2
    answer_schema:
      type: string
      enum:
        - contraindication
        - patient_refusal
        - pending_followup
        - not_documented
        - not_applicable
    depends_on:
      - T2-StepTherapyMatch
    naepp_source: "EPR-3 Component 4, p.214 — 'In the opinion of the
      Expert Panel, the use of LABA for the treatment of acute symptoms
      or exacerbations is not currently recommended (Evidence D)' and the
      LABA monotherapy contraindication (Evidence A). 2020 Focused Update
      Rec 14 (p.90) — LAMA contraindicated in glaucoma and urinary
      retention; LABA contraindicated if individual cannot tolerate it,
      unsuitable device, insurance/supply. Methodologically derived
      attribution category — not a single recommendation."
    evidence_grade: methodological
    clinical_rationale: >-
      A management gap is qualitatively different when (a) the clinician
      knew about the gap and a reason exists (contraindication, refusal,
      pending step-up) versus (b) the gap is simply undocumented. Only
      the latter is a concordance failure attributable to the care team.
    retrieval_hints: >-
      Predicate on T2-StepTherapyMatch.
      If T2-StepTherapyMatch = 'matches' → 'not_applicable'.
      Otherwise scan notes:
        - Allergy section / adverse reactions: → 'contraindication'
          (e.g., LABA intolerance, ICS-induced thrush in spite of
          spacer, glaucoma/urinary retention for LAMA).
        - "Patient declined inhaled steroid", "refused step-up",
          "preferring alternative" → 'patient_refusal'.
        - "Will reassess at next visit", "planned step-up at
          follow-up", "trial period" → 'pending_followup'.
        - Insurance/cost barrier with documented appeal in progress
          → 'pending_followup'.
        - No documentation of any of the above → 'not_documented'.
