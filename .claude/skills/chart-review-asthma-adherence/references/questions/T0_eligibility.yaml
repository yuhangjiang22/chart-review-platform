# T0 — Eligibility tier (gates whether the patient enters the adherence
# assessment at all). Questions are grounded in NAEPP EPR-3 (2007)
# Diagnosis criteria and platform methodology requirements.

questions:
  - question_id: T0-AsthmaDx
    text: Does the chart document an active diagnosis of asthma (ICD-10 J45.x or
      equivalent prose) at any point in the lookback window?
    tier: 0
    answer_schema:
      type: boolean
      description: true iff an asthma diagnosis is documented; null if unknowable from
        the chart.
    naepp_source: "EPR-3 Section 3, Component 1, p.40-43 — Diagnosis of Asthma;
      Box 3-1 Key Indicators for Considering a Diagnosis of Asthma"
    evidence_grade: clinical_criterion
    clinical_rationale: >-
      EPR-3 requires (1) episodic symptoms of airflow obstruction or airway
      hyperresponsiveness, (2) at least partial reversibility, and (3)
      exclusion of alternative diagnoses. ICD-10 J45.x in the structured record
      is taken as documentation that a clinician applied these criteria.
    retrieval_hints: "STRUCTURED FIRST → read_structured_data(table=\"conditions\").
      Any row with icd10cm matching J45.* (J45.0-J45.99) and status=\"active\"
      is a match. If conditions is empty, fall back to notes: problem list,
      encounter diagnoses, assessment lines. Accept \"asthma\", \"reactive
      airway disease\" only when paired with an asthma ICD code. Don't infer
      from inhaler use alone."

  - question_id: T0-AgeOk
    text: Is the patient age at the index date between 2 and 17 years inclusive
      (the study's pediatric cohort scope)?
    tier: 0
    answer_schema:
      type: boolean
    naepp_source: "Study cohort definition — 'Agentic Chart Review for Pediatric
      Asthma Guideline Adherence', Inclusion Criteria: pediatric patients ages
      2-17 years (Cohort_Definition_Asthma_Adherence.docx; Design doc Study
      Population). NAEPP guideline HANDLING is age-band-stratified (0-4, 5-11,
      12+) and is selected downstream by T0-AgeBand."
    evidence_grade: population_scope
    clinical_rationale: >-
      The study population is pediatric asthma patients ages 2-17. Eligibility
      admits that full range; the age-appropriate guideline logic (control
      instrument, stepwise-therapy table) is then selected by T0-AgeBand,
      because NAEPP EPR-3 applies different criteria to ages 0-4, 5-11, and 12+.
    retrieval_hints: Demographic header or notes. If age is unclear, return null.

  - question_id: T0-AgeBand
    text: Which NAEPP guideline age band does the patient fall into at the index
      date? NAEPP applies different control instruments and stepwise-therapy
      tables by band. Within the 2-17 cohort the bands are 2-4 (NAEPP 0-4
      handling), 5-11, and 12-17 (NAEPP 12+ handling).
    tier: 0
    answer_schema:
      type: string
      enum:
        - age_2_4
        - age_5_11
        - age_12_17
    depends_on:
      - T0-AgeOk
    naepp_source: "EPR-3 stratifies diagnosis, control assessment, and the
      stepwise approach by age: 0-4 years (Figures 4-1a / 4-2a), 5-11 years
      (Figures 4-1b / 4-2b), and 12+ years (Figure 4-5). Design doc:
      'Age-stratified guideline handling: NAEPP guidelines differ by age group
      (0-4, 5-11, 12+).'"
    evidence_grade: population_scope
    clinical_rationale: >-
      The correct control instrument (Childhood ACT for 5-11 vs ACT for 12+;
      symptom-based for 2-4) and the correct stepwise-therapy table both depend
      on this band; downstream T1/T2 questions and rules interpret their
      thresholds relative to it. NOTE for analysis: the study's REPORTING strata
      are 2-5 / 6-11 / 12-17, while guideline HANDLING uses the NAEPP boundaries
      above — they differ at age 5 (NAEPP places a 5-year-old in 5-11 / C-ACT).
      PI to confirm the 5-year-old handling before lock.
    retrieval_hints: Compute from age at the index date — 2-4 -> age_2_4;
      5-11 -> age_5_11; 12-17 -> age_12_17. If age is unknown, return null.

  - question_id: T0-LookbackHasNotes
    text: Are there at least 2 outpatient or specialty notes in the lookback window
      (so adherence has chart evidence to measure against)?
    tier: 0
    answer_schema:
      type: boolean
    naepp_source: "Methodological — not a NAEPP recommendation. Derived from
      EPR-3 p.94 (Component 2 KP) requirement for 'regular review by an
      informed clinician' (Evidence B), which presupposes longitudinal notes."
    evidence_grade: methodological
    clinical_rationale: >-
      Adherence cannot be assessed from a single encounter. EPR-3 grounds the
      assessment of asthma control in 'regular review by an informed
      clinician' — at least 2 longitudinal notes are the minimum chart
      evidence to evaluate that review.
    retrieval_hints: >-
      Use the encounter list + note titles to COUNT qualifying notes in the
      lookback window. Qualifying notes are outpatient clinic progress notes and
      specialty consult/follow-up notes (in-person, video, or telehealth visits
      that generate a clinician note).

      Do NOT count ED/hospitalization documentation (ED provider notes, H&P,
      discharge summaries), procedures-only reports (PFT/spirometry reports
      without a clinic note), imaging/lab result documents, telephone
      encounters, refill requests, portal messages, administrative
      documentation, or scheduling communications.

      If fewer than 2 qualifying outpatient/specialty notes are present, answer
      false.
