# T0 — Eligibility gate. A patient must satisfy R-T0-Eligible to enter
# the adherence audit at all.

rules:
  - rule_id: R-T0-Eligible
    description: >-
      Patient is in scope for the adherence audit: asthma diagnosis
      documented, age 2-17 (the study's pediatric cohort), and at least 2
      outpatient/specialty notes available to assess longitudinal care.
      (T0-AgeBand then selects the age-appropriate guideline logic; it does
      not gate eligibility.)
    naepp_source: >-
      EPR-3 p.40-43 (asthma diagnosis criteria); study cohort definition
      (Pediatric Asthma Guideline Adherence, ages 2-17); platform methodology
      requirement for >= 2 longitudinal notes.
    verdict_if: "T0-AsthmaDx == true and T0-AgeOk == true and T0-LookbackHasNotes == true"
    excluded_if: "T0-AsthmaDx != true or T0-AgeOk != true or T0-LookbackHasNotes != true"
    supporting_questions: [T0-AsthmaDx, T0-AgeOk, T0-LookbackHasNotes]
